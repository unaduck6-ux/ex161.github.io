<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Boxes</title>
    <style>
        body {
            font-family: serif;
            padding: 20px;
        }
        .box {
            font-size: 40px;
            font-weight: bold;
            padding: 10px;
            margin: 20px 0;
            width: 80%;
        }
        /* 第一個方塊：淺藍背景 + 雙線紅色邊框 */
        .box1 {
            background-color: #add8e6;
            border: 8px double #e74c3c; /* 使用 double 樣式 */
        }
        /* 第二個方塊：黃色背景 + 藍色圓角邊框 */
        .box2 {
            background-color: #ffff00;
            border: 3px solid #3498db;
            border-radius: 10px;
        }
        /* 第三個方塊：綠色背景 + 粗點線邊框 */
        .box3 {
            background-color: #2ecc71;
            border: 8px dotted #888; /* 粗點線邊框 */
            color: #000;
        }
    </style>
</head>
<body>
    <div class="box box1">Hello World</div>
    <div class="box box2">Hello World</div>
    <div class="box box3">Hello World</div>
</body>
</html>
